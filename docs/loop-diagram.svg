<svg width="680" height="870" viewBox="0 0 680 870" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
<title>The crosscheck loop shown as two feedback cycles, not a one-way pipeline</title>
<desc>A vertical flow from Brief through Draft, a Direction gate, Critics, Lead judges, a Ledger and honesty guard, to Ship. Two dashed loop-back arrows show the actual repetition: the Direction gate loops back to Draft on structural feedback, and Lead judges loops back to Critics until both approve the same unchanged final.</desc>
<rect x="0" y="0" width="680" height="870" fill="#FFFFFF"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- main flow -->
<rect x="260" y="60" width="160" height="50" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="81" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Brief</text>
<text x="340" y="98" text-anchor="middle" font-size="12" fill="#5F5E5A">shared context</text>
<line x1="340" y1="110" x2="340" y2="170" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="260" y="170" width="160" height="50" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="191" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Draft</text>
<text x="340" y="208" text-anchor="middle" font-size="12" fill="#5F5E5A">fanned-out worker</text>
<line x1="340" y1="220" x2="340" y2="290" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="260" y="290" width="160" height="50" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="311" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Direction gate</text>
<text x="340" y="328" text-anchor="middle" font-size="12" fill="#534AB7">principal reviews</text>
<line x1="340" y1="340" x2="340" y2="410" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="350" y="378" text-anchor="start" font-size="12" fill="#5F5E5A">gate clears</text>

<path d="M420,315 C500,315 500,195 420,195" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="505" y="258" text-anchor="start" font-size="12" fill="#534AB7">direction loop</text>

<rect x="260" y="410" width="160" height="50" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="431" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Critics</text>
<text x="340" y="448" text-anchor="middle" font-size="12" fill="#0F6E56">cross-family audit</text>
<line x1="340" y1="460" x2="340" y2="530" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="260" y="530" width="160" height="50" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="551" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Lead judges</text>
<text x="340" y="568" text-anchor="middle" font-size="12" fill="#993C1D">applies findings</text>
<line x1="340" y1="580" x2="340" y2="650" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="350" y="618" text-anchor="start" font-size="12" fill="#5F5E5A">both critics approve</text>

<path d="M420,555 C500,555 500,435 420,435" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="505" y="498" text-anchor="start" font-size="12" fill="#0F6E56">convergence loop</text>

<rect x="230" y="650" width="220" height="50" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="671" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Ledger + honesty guard</text>
<text x="340" y="688" text-anchor="middle" font-size="12" fill="#5F5E5A">proved and honest status</text>
<line x1="340" y1="700" x2="340" y2="770" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="260" y="770" width="160" height="50" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="340" y="791" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">Ship</text>
<text x="340" y="808" text-anchor="middle" font-size="12" fill="#3B6D11">gates cleared</text>

<!-- legend -->
<rect x="40" y="838" width="12" height="12" rx="2" fill="#888780"/><text x="56" y="848" text-anchor="start" font-size="12" fill="#5F5E5A">worker</text>
<rect x="170" y="838" width="12" height="12" rx="2" fill="#7F77DD"/><text x="186" y="848" text-anchor="start" font-size="12" fill="#5F5E5A">principal gate</text>
<rect x="340" y="838" width="12" height="12" rx="2" fill="#1D9E75"/><text x="356" y="848" text-anchor="start" font-size="12" fill="#5F5E5A">critics</text>
<rect x="460" y="838" width="12" height="12" rx="2" fill="#D85A30"/><text x="476" y="848" text-anchor="start" font-size="12" fill="#5F5E5A">lead</text>
<rect x="560" y="838" width="12" height="12" rx="2" fill="#639922"/><text x="576" y="848" text-anchor="start" font-size="12" fill="#5F5E5A">ship</text>
</svg>
