<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
<title>The tier gate: two questions route every edit to a tier</title>
<desc>A decision flow. An edit arrives. Question one: can a script prove it is correct? Yes routes to Tier 0, solo-verify. No leads to question two: is this the frozen final for ship? No routes to Tier 1, one audit round. Yes routes to Tier 2, the deep loop. A footnote states that stakes never enter the routing and that when unsure you go one tier up.</desc>
<rect x="0" y="0" width="680" height="560" fill="#FFFFFF"/>
<defs><marker id="tg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- start -->
<rect x="260" y="30" width="160" height="44" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="57" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">An edit arrives</text>
<line x1="340" y1="74" x2="340" y2="120" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#tg-arrow)"/>

<!-- Q1 -->
<rect x="220" y="120" width="240" height="64" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="146" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Can a script prove it?</text>
<text x="340" y="164" text-anchor="middle" font-size="12" fill="#534AB7">grep · totals assert · render check</text>

<!-- Q1 yes -> Tier 0 -->
<path d="M220,152 L120,152 L120,220" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#tg-arrow)"/>
<text x="128" y="146" text-anchor="start" font-size="12" font-weight="500" fill="#0F6E56">yes</text>
<rect x="40" y="220" width="160" height="88" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Tier 0 · solo</text>
<text x="120" y="264" text-anchor="middle" font-size="12" fill="#0F6E56">lead edits alone,</text>
<text x="120" y="280" text-anchor="middle" font-size="12" fill="#0F6E56">names the check first,</text>
<text x="120" y="296" text-anchor="middle" font-size="12" fill="#0F6E56">shows its output</text>

<!-- Q1 no -> Q2 -->
<line x1="340" y1="184" x2="340" y2="240" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#tg-arrow)"/>
<text x="350" y="215" text-anchor="start" font-size="12" font-weight="500" fill="#5F5E5A">no</text>

<!-- Q2 -->
<rect x="220" y="240" width="240" height="64" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="266" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Frozen final, ready to ship?</text>
<text x="340" y="284" text-anchor="middle" font-size="12" fill="#534AB7">the one deep pass per deliverable</text>

<!-- Q2 no -> Tier 1 -->
<path d="M340,304 L340,340 L200,340 L200,370" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#tg-arrow)"/>
<text x="350" y="326" text-anchor="start" font-size="12" font-weight="500" fill="#5F5E5A">no</text>
<rect x="120" y="370" width="160" height="88" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="200" y="395" text-anchor="middle" font-size="14" font-weight="600" fill="#444441">Tier 1 · light</text>
<text x="200" y="414" text-anchor="middle" font-size="12" fill="#5F5E5A">one audit round,</text>
<text x="200" y="430" text-anchor="middle" font-size="12" fill="#5F5E5A">both critics,</text>
<text x="200" y="446" text-anchor="middle" font-size="12" fill="#5F5E5A">no loop</text>

<!-- Q2 yes -> Tier 2 -->
<path d="M460,272 L480,272 L480,370" fill="none" stroke="#B3401F" stroke-width="1" marker-end="url(#tg-arrow)"/>
<text x="488" y="266" text-anchor="start" font-size="12" font-weight="500" fill="#B3401F">yes</text>
<rect x="400" y="370" width="160" height="88" rx="4" fill="#FAECE7" stroke="#B3401F" stroke-width="0.5"/>
<text x="480" y="395" text-anchor="middle" font-size="14" font-weight="600" fill="#7A2C15">Tier 2 · deep</text>
<text x="480" y="414" text-anchor="middle" font-size="12" fill="#B3401F">the full loop,</text>
<text x="480" y="430" text-anchor="middle" font-size="12" fill="#B3401F">to a clean pass on</text>
<text x="480" y="446" text-anchor="middle" font-size="12" fill="#B3401F">the unchanged final</text>

<!-- footnotes -->
<text x="340" y="500" text-anchor="middle" font-size="12" fill="#5F5E5A">Stakes never enter the routing: a client one-liner is still Tier 0 if a script proves it.</text>
<text x="340" y="520" text-anchor="middle" font-size="12" fill="#5F5E5A">Cannot name the check up front? It is not Tier 0. Unsure between tiers? Go one up.</text>
<text x="340" y="540" text-anchor="middle" font-size="12" fill="#5F5E5A">An edit landed after the clean Tier 2 pass voids it and owes another.</text>
</svg>
